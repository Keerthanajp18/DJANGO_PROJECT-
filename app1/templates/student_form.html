<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Registration</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card">
                
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">Student Registration</h4>
                </div>

                <div class="card-body">
                    <form method="post" novalidate action="{% url 'save_student' %}">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label for="stud_name" class="form-label">Name</label>
                            <input type="text" class="form-control" id="stud_name" name="stud_name" required>
                        </div>

                        <div class="mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" class="form-control" id="email" name="email" required>
                        </div>

                        <div class="mb-3">
                            <label for="course" class="form-label">Course</label>
                            <input type="text" class="form-control" id="course" name="course" required>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-success">Submit</button>
                        </div>

                    </form>

                    {% if success %}
                        <div class="alert alert-success mt-3" role="alert">
                            Student details saved successfully!
                        </div>
                    {% endif %}

                </div>

            </div>

        </div>
    </div>
</div>

</body>
</html>
