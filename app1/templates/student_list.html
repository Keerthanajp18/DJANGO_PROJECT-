<html>
<head>
    <title>Student List</title>
    <style>
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 10px;
            border: 1px solid black;
            text-align: left;
        }
        .btn-add {
            display: inline-block;
            margin-bottom: 10px;
            padding: 8px 12px;
            background-color: #4CAF50;
            color: white;
            text-decoration: none;
        }
        .btn {
            padding: 6px 12px;
            margin: 2px;
            text-decoration: none;
            color: white;
            border-radius: 5px;
            font-size: 14px;
            }

/* View button */
        .view {
            background-color: #3498db;
              }

/* Edit button */
        .edit {
            background-color: #f39c12;
            }

/* Delete button */
        .delete {
           background-color: #e74c3c;
            }

/* Hover effect */
        .btn:hover {
           opacity: 0.8;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Student Details</h1>

        <a href="{% url 'student_form' %}" class="btn btn-add">Add New Student</a>

        <table>
            <thead>
                <tr>
                    <th>Student ID</th>
                    <th>Student Name</th>
                    <th>Email</th>
                    <th>Course</th>
                    <th>Actions</th>
                </tr>
            </thead>

            <tbody>
                {% for student in students %}
                <tr>
                    <td>{{ student.stud_id }}</td>
                    <td>{{ student.stud_name }}</td>
                    <td>{{ student.email }}</td>
                    <td>{{ student.course }}</td>
                    <td>
                        
                         <a href="{% url 'view_student' student.stud_id %}" class="btn view">View</a>
                         <a href="{% url 'edit_student' student.stud_id %}" class="btn edit">Edit</a>
                         <a href="{% url 'delete_student' student.stud_id %}" class="btn delete"
                         onclick="return confirm('Are you sure?')">Delete</a>
                         
                     </td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="5">No students found.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
